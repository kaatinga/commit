version: "2"

run:
  timeout: 5m

linters:
  enable:
    # gosec replaces the standalone securego/gosec CI step.
    - gosec
  # govet, staticcheck, errcheck, ineffassign and unused are enabled by default in v2.

formatters:
  enable:
    # gofmt replaces the manual `gofmt -s -l` check; violations are reported by `run`.
    - gofmt
  settings:
    gofmt:
      simplify: true
